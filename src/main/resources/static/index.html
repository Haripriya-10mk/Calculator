<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calculator</title>
</head>
<style>
    input{
        margin:10px;
        padding:15px;
        width:350px;
    }
    button{
        padding:15px;
        background-color:antiquewhite;
        border-radius:20px;
        width:150px;
        margin:10px;
    }
    .calc{
        display:grid;
        grid-template-columns:200px 200px;
        margin:auto;
        padding:12px;
        justify-content: center;
        border-bottom: honeydew;
    }
    #title{
        grid-column:1/3;
    }
    #n{
        grid-column:1/3;
    }
    .container{
        background-color:sandybrown;
        width:500px;
        border-radius:20px;
    }
    #spir{
        grid-column:1/3;
    }
</style>
<body>
    <center>
        <div class="container">
        <div class="calc">
            <div id="title"><h1>Scientific Calculator</h1></div>
            <div id="n"><input id="num1" type="number" placeholder="Enter the first number"></div>
            <div id="n"><input id="num2" type="number" placeholder="Enter the second number"></div>
            <div><button onclick="add()">ADD</button></div>
            <div><button onclick="log10()">Log10</button></div>
            <div><button onclick="log2()">Log2</button></div>
            <div><button onclick="tan()">Tan</button></div>
            <div><button onclick="sin()">Sin</button></div>
            <div><button onclick="cos()">Cos</button></div>
            <div id="spir"><button onclick="spiral()">Spiral_Printing</button></div>
            <div><p id="result"></p></div>
        </div>
        </div>
    </center>
    <script>
        async function add(){
            let n1=document.getElementById("num1").value;
            let n2=document.getElementById("num2").value;
            //let sum=Number(a)+Number(b);
            //document.getElementById("result").textContent="Addition: "+sum;
            let response=await fetch(`http://localhost:8080/calc/add/${n1}/${n2}`);
            let t=await response.text();
            document.getElementById("result").innerText=t;
        }
        async function log10(){
            let n1=document.getElementById("num1").value;
            let response=await fetch(`http://localhost:8080/calc/log10/${n1}`);
            let t=await response.text();
            document.getElementById("result").innerText=t;
        }
        async function log2(){
            let n1=document.getElementById("num1").value;
            let response=await fetch(`http://localhost:8080/calc/log2/${n1}`);
            let t=await response.text();
            document.getElementById("result").innerText=t;
        }
        async function tan(){
            let a=document.getElementById("num1").value;
            let response=await fetch(`http://localhost:8080/calc/tan/${a}`);
            let t=await response.text();
            document.getElementById("result").innerText=t;
        }
        async function sin(){
            let a=document.getElementById("num1").value;
            let response=await fetch(`http://localhost:8080/calc/sin/${a}`);
            let t=await response.text();
            document.getElementById("result").innerText=t;
        }
        async function spiral(){
            let response=await fetch(`http://localhost:8080/spiral_matrix_printing`);
            let t=await response.text();
            document.getElementById("result").innerText=t;
        }
    </script>
</body>
</html>
